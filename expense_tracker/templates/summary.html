<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h2 class="card-title mb-0">Monthly Expense Summary</h2>
                    </div>
                    <div class="card-body">
                        {% if summary %}
                        <h4>Category Breakdown:</h4>
                        <ul class="list-group mb-3">
                            {% for category, amount in summary.items() %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                {{ category }}
                                <span class="badge bg-primary rounded-pill">Ksh{{ "%.2f"|format(amount) }}</span>
                            </li>
                            {% endfor %}
                        </ul>
                        <h4>Visual Summary:</h4>
                        <img src="{{ url_for('static', filename='summary.png') }}?t={{ timestamp }}" class="img-fluid" alt="Expense Summary Chart">
                        {% else %}
                        <div class="alert alert-info">
                            No expenses found for this month.
                        </div>
                        {% endif %}
                        <hr>
                        <a href="/" class="btn btn-primary">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
